<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Marker Style Lab — live</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  :root{--red:#ff2e00;--ink:#1a1a2e;--paper:#fff;--bg:#f7f7f4;--line:#141414;--soft:#4f4f4a}
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,sans-serif;background:var(--bg);color:#141414;padding:28px}
  h1{font-size:21px;margin:0 0 4px}
  p.sub{margin:0 0 24px;color:var(--soft);max-width:680px;line-height:1.45}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px}
  .cell{border:2px solid var(--line);background:var(--paper);box-shadow:6px 6px 0 rgba(20,20,20,.14)}
  .map{height:230px}
  .cap{padding:11px 13px;border-top:2px solid var(--line)}
  .cap b{display:block;font-size:14px;margin-bottom:3px}
  .cap span{color:var(--soft);font-size:12.5px;line-height:1.4}
  .pill{display:inline-block;font-size:10.5px;font-weight:700;padding:1px 6px;border:1.5px solid var(--line);margin-left:6px;vertical-align:1px}
  .pill.circle{background:#e7eee5}.pill.symbol{background:#ffe7e1}
</style>
</head>
<body>
  <h1>Marker Style Lab — live</h1>
  <p class="sub">Real MapLibre maps, real basemap, sample Nevada City points. <span class="pill circle">circle</span> = restyle your existing vector dots (no SVG). <span class="pill symbol">symbol</span> = icon/glyph markers. Click any dot — it turns red, like the app.</p>
  <div class="grid" id="grid"></div>
<script>
const STYLE="https://tiles.openfreemap.org/styles/liberty";
const RED="#ff2e00",INK="#1a1a2e",PAPER="#ffffff";
const PLACES=[
  {name:"Miners Foundry",cat:"venue",lng:-121.0153,lat:39.2618,anchor:true},
  {name:"Nevada Theatre",cat:"theater",lng:-121.0142,lat:39.2631,anchor:true},
  {name:"Center for the Arts",cat:"music",lng:-121.0610,lat:39.2188,anchor:true},
  {name:"Holbrooke",cat:"venue",lng:-121.0598,lat:39.2197},
  {name:"Stone Hall",cat:"gallery",lng:-121.0185,lat:39.2600},
  {name:"Open Book",cat:"gallery",lng:-121.0167,lat:39.2642},
  {name:"Music in Mtns",cat:"music",lng:-121.0205,lat:39.2575},
  {name:"Off Broad St",cat:"theater",lng:-121.0131,lat:39.2655}
];
const fc={type:"FeatureCollection",features:PLACES.map((p,i)=>({type:"Feature",geometry:{type:"Point",coordinates:[p.lng,p.lat]},properties:{id:i,name:p.name,cat:p.cat,anchor:!!p.anchor,selected:false}}))};
const CAT_COLOR=["match",["get","cat"],"venue","#1a1a2e","theater","#ff2e00","music","#365c76","gallery","#b8860b","#5d625b"];
const CAT_GLYPH=["match",["get","cat"],"venue","◆","theater","▲","music","♪","gallery","●","•"];
const OPTIONS=[
  {id:"baseline",kind:"circle",title:"0 · Current baseline",desc:"Dark dots, white stroke, red rings on anchors, red fill when selected. Exactly today.",
   layers:()=>[
     {id:"a-ring",type:"circle",filter:["get","anchor"],paint:{"circle-radius":12,"circle-color":"rgba(0,0,0,0)","circle-stroke-color":RED,"circle-stroke-width":2,"circle-opacity":.88}},
     {id:"dot",type:"circle",paint:{"circle-radius":["case",["get","selected"],9.5,["get","anchor"],8,5.5],"circle-color":["case",["get","selected"],RED,INK],"circle-stroke-color":PAPER,"circle-stroke-width":1.4}}]},
  {id:"category",kind:"circle",title:"1 · Color by category",desc:"Fill encodes type — venue dark, theater red, music blue, gallery gold. Selection thickens white stroke.",
   layers:()=>[{id:"dot",type:"circle",paint:{"circle-radius":["case",["get","selected"],9,["get","anchor"],7.5,6],"circle-color":CAT_COLOR,"circle-stroke-color":PAPER,"circle-stroke-width":["case",["get","selected"],3,1.4]}}]},
  {id:"hierarchy",kind:"circle",title:"2 · Stronger size hierarchy",desc:"Anchors clearly bigger; ordinary places recede via opacity. Still pure circles.",
   layers:()=>[{id:"dot",type:"circle",paint:{"circle-radius":["case",["get","selected"],11,["get","anchor"],9,5],"circle-color":["case",["get","selected"],RED,INK],"circle-opacity":["case",["get","anchor"],1,.62],"circle-stroke-color":PAPER,"circle-stroke-width":["case",["get","anchor"],2,1]}}]},
  {id:"bubble",kind:"circle",title:"3 · Bubble / high-contrast",desc:"Thick white halo + soft glow so dots pop on busy streets.",
   layers:()=>[
     {id:"glow",type:"circle",paint:{"circle-radius":14,"circle-color":"rgba(255,46,0,0.10)","circle-blur":.5}},
     {id:"dot",type:"circle",paint:{"circle-radius":["case",["get","selected"],9,7],"circle-color":["case",["get","selected"],RED,INK],"circle-stroke-color":PAPER,"circle-stroke-width":3}}]},
  {id:"glyph",kind:"symbol",title:"4 · Glyph markers",desc:"Symbol layer: a shape per category (◆venue ▲theater ♪music ●gallery). Text glyphs, no sprite.",symbol:true},
  {id:"labeled",kind:"symbol",title:"5 · Dot + always-on name",desc:"Dot plus permanent name label. Great for a small curated set; collision-hides when crowded.",labeled:true}
];
function buildCell(opt){
  const cell=document.createElement("div");cell.className="cell";
  const mapEl=document.createElement("div");mapEl.className="map";mapEl.id="map-"+opt.id;
  const cap=document.createElement("div");cap.className="cap";
  cap.innerHTML='<b>'+opt.title+'<span class="pill '+opt.kind+'">'+opt.kind+'</span></b><span>'+opt.desc+'</span>';
  cell.appendChild(mapEl);cell.appendChild(cap);document.getElementById("grid").appendChild(cell);
  const map=new maplibregl.Map({container:mapEl.id,style:STYLE,center:[-121.038,39.241],zoom:11.4,attributionControl:false});
  map.on("load",()=>{
    const data=JSON.parse(JSON.stringify(fc));
    map.addSource("places",{type:"geojson",data});
    if(opt.labeled){
      map.addLayer({id:"dot",type:"circle",source:"places",paint:{"circle-radius":["case",["get","selected"],7,5],"circle-color":["case",["get","selected"],RED,INK],"circle-stroke-color":PAPER,"circle-stroke-width":1.6}});
      map.addLayer({id:"lbl",type:"symbol",source:"places",layout:{"text-field":["get","name"],"text-size":11,"text-offset":[0,1.1],"text-anchor":"top"},paint:{"text-color":INK,"text-halo-color":PAPER,"text-halo-width":1.4}});
    }else if(opt.symbol){
      map.addLayer({id:"dot",type:"symbol",source:"places",layout:{"text-field":CAT_GLYPH,"text-size":["case",["get","selected"],26,["get","anchor"],22,18],"text-allow-overlap":true},paint:{"text-color":["case",["get","selected"],RED,CAT_COLOR],"text-halo-color":PAPER,"text-halo-width":1.6}});
    }else{
      opt.layers().forEach(l=>map.addLayer({...l,source:"places"}));
    }
    map.on("click","dot",(e)=>{const id=e.features[0].properties.id;data.features.forEach(f=>f.properties.selected=(f.properties.id==id));map.getSource("places").setData(data);});
    map.on("mouseenter","dot",()=>map.getCanvas().style.cursor="pointer");
    map.on("mouseleave","dot",()=>map.getCanvas().style.cursor="");
  });
}
OPTIONS.forEach(buildCell);
</script>
</body>
</html>
