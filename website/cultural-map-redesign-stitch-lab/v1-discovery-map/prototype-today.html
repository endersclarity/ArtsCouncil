<!DOCTYPE html>
<!-- PROTOTYPE — throwaway. Three variants of the "Today" field-guide front page
     per docs/FABLE-VISION.md, switchable via ?variant=A|B|C and the floating bar.
     Delete or absorb after a winner is picked. -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PROTOTYPE — Today (field guide)</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700;9..144,900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<style>
  :root{
    --red:#ff2e00; --ink:#1a1a2e; --paper:#f7f7f4; --paper-warm:#f3efe6;
    --rule:#c9c4b4; --faint:#8a8676;
    --serif:"Fraunces",Georgia,serif; --sans:"DM Sans",sans-serif; --mono:"IBM Plex Mono",monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  a{color:inherit}
  #stage{min-height:100vh}
  .ink-map .maplibregl-canvas{filter:grayscale(1) contrast(1.04) brightness(1.05)}
  .maplibregl-ctrl-attrib{font-size:9px;opacity:.6}

  /* ---------- A · BROADSHEET ---------- */
  .bs{max-width:1060px;margin:0 auto;padding:34px 28px 90px;background:var(--paper);}
  .bs-topline{display:flex;justify-content:space-between;font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;border-bottom:1px solid var(--ink);padding-bottom:8px}
  .bs-masthead{font-family:var(--serif);font-weight:900;text-align:center;font-size:clamp(40px,7vw,84px);letter-spacing:-.02em;line-height:1;padding:26px 0 10px}
  .bs-masthead em{font-style:italic;font-weight:300}
  .bs-dateline{text-align:center;font-family:var(--mono);font-size:12px;letter-spacing:.22em;text-transform:uppercase;border-top:3px double var(--ink);border-bottom:3px double var(--ink);padding:9px 0;margin-bottom:30px}
  .bs-cols{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:0}
  .bs-col{padding:0 24px;border-left:1px solid var(--rule)}
  .bs-col:first-child{padding-left:0;border-left:none}
  .bs-kicker{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--red);margin-bottom:10px}
  .bs-lead h1{font-family:var(--serif);font-weight:700;font-size:34px;line-height:1.12;margin-bottom:12px}
  .bs-lead p{font-size:14.5px;line-height:1.65;margin-bottom:12px}
  .bs-lead .why{font-family:var(--serif);font-style:italic;font-size:15px;line-height:1.55;border-top:1px solid var(--rule);padding-top:12px;color:#3a3a4e}
  .bs-ev{padding:11px 0;border-bottom:1px solid var(--rule)}
  .bs-ev .d{font-family:var(--mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--faint)}
  .bs-ev .d b{color:var(--red);font-weight:600;margin-right:6px}
  .bs-ev h3{font-family:var(--serif);font-weight:600;font-size:16.5px;line-height:1.25;margin:3px 0 2px}
  .bs-ev .v{font-size:12px;color:var(--faint)}
  .bs-route{padding:13px 0;border-bottom:1px solid var(--rule)}
  .bs-route h3{font-family:var(--serif);font-weight:700;font-size:18px;margin-bottom:5px}
  .bs-route h3 .no{font-family:var(--mono);font-weight:500;font-size:11px;color:var(--red);vertical-align:middle;margin-right:7px;letter-spacing:.1em}
  .bs-route p{font-size:13px;line-height:1.55;color:#3a3a4e}
  .bs-route .stops{font-family:var(--mono);font-size:10.5px;letter-spacing:.04em;color:var(--faint);margin-top:7px;line-height:1.7}
  .bs-mapnote{margin-top:26px;border:1px solid var(--ink);padding:14px 16px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;display:flex;justify-content:space-between;align-items:center}
  .bs-mapnote a{color:var(--red);text-decoration:none;font-weight:600}
  @media(max-width:880px){.bs-cols{grid-template-columns:1fr}.bs-col{border-left:none;padding:0;margin-bottom:30px}}

  /* ---------- B · LEDGER & INK ---------- */
  .lg{display:flex;height:100vh;overflow:hidden}
  .lg-rail{width:400px;min-width:340px;background:var(--paper-warm);border-right:1px solid var(--ink);overflow-y:auto;padding:28px 26px 80px}
  .lg-head{border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:6px}
  .lg-head .k{font-family:var(--mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--red)}
  .lg-head h1{font-family:var(--serif);font-weight:900;font-size:42px;line-height:1.02;letter-spacing:-.02em;margin-top:6px}
  .lg-head h1 em{font-style:italic;font-weight:300}
  .lg-day{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);padding:20px 0 4px;border-bottom:1px solid var(--ink)}
  .lg-row{display:flex;gap:14px;padding:13px 0;border-bottom:1px solid var(--rule);cursor:pointer}
  .lg-row:hover{background:rgba(255,46,0,.05)}
  .lg-row .tick{width:9px;height:9px;background:var(--red);margin-top:5px;flex:none}
  .lg-row .tick.off{background:transparent;border:1.5px solid var(--faint)}
  .lg-row h3{font-family:var(--serif);font-weight:600;font-size:16px;line-height:1.25}
  .lg-row .v{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-top:3px;letter-spacing:.04em}
  .lg-map{flex:1;position:relative}
  .lg-legend{position:absolute;top:14px;left:14px;z-index:5;background:var(--paper);border:1px solid var(--ink);padding:9px 13px;font-family:var(--mono);font-size:10.5px;letter-spacing:.1em}
  .lg-legend .dot{display:inline-block;width:8px;height:8px;background:var(--red);border-radius:50%;margin-right:7px}
  @media(max-width:760px){.lg{flex-direction:column}.lg-rail{width:100%;height:55vh;border-right:none;border-bottom:1px solid var(--ink)}.lg-map{height:45vh}}

  /* ---------- C · TRAIL CARDS ---------- */
  .tr{background:var(--paper-warm);min-height:100vh;padding-bottom:110px}
  .tr-strip{position:sticky;top:0;z-index:5;height:150px;border-bottom:2px solid var(--ink)}
  .tr-strip .lbl{position:absolute;z-index:6;bottom:10px;left:12px;background:var(--ink);color:var(--paper);font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;padding:5px 10px}
  .tr-col{max-width:480px;margin:0 auto;padding:26px 18px 0}
  .tr-date{font-family:var(--mono);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--red);text-align:center}
  .tr-title{font-family:var(--serif);font-weight:900;font-size:38px;line-height:1.05;text-align:center;margin:8px 0 6px;letter-spacing:-.02em}
  .tr-dek{font-family:var(--serif);font-style:italic;font-size:15.5px;line-height:1.5;text-align:center;color:#3a3a4e;margin-bottom:30px}
  .tr-leg{display:flex;justify-content:center;padding:2px 0}
  .tr-leg span{border-left:2px dotted var(--faint);height:34px}
  .tr-card{background:var(--paper);border:1px solid var(--ink);box-shadow:4px 4px 0 var(--ink);padding:18px 18px 16px;position:relative;margin:0 0 2px}
  .tr-card .stamp{position:absolute;top:-15px;left:-13px;width:34px;height:34px;border-radius:50%;background:var(--ink);color:var(--paper);font-family:var(--mono);font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:center}
  .tr-card.ev{border-color:var(--red);box-shadow:4px 4px 0 var(--red)}
  .tr-card.ev .stamp{background:var(--red)}
  .tr-card .k{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--faint);margin-bottom:5px}
  .tr-card.ev .k{color:var(--red)}
  .tr-card h3{font-family:var(--serif);font-weight:700;font-size:21px;line-height:1.15;margin-bottom:6px}
  .tr-card p{font-size:13.5px;line-height:1.55;color:#3a3a4e}
  .tr-card .meta{font-family:var(--mono);font-size:10.5px;color:var(--faint);margin-top:9px;letter-spacing:.04em}

  /* ---------- switcher (not part of the design) ---------- */
  #sw{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:99;display:flex;align-items:center;gap:2px;background:#111;color:#fff;border-radius:999px;padding:6px 8px;font-family:var(--mono);font-size:12px;box-shadow:0 6px 24px rgba(0,0,0,.35)}
  #sw button{background:none;border:none;color:#fff;font-size:15px;cursor:pointer;padding:4px 10px;border-radius:999px}
  #sw button:hover{background:#333}
  #sw .lbl{padding:0 10px;white-space:nowrap;letter-spacing:.04em}
  #sw .tag{color:#ff6b4a;margin-right:8px}
</style>
</head>
<body>
<div id="stage"></div>
<div id="sw">
  <span class="lbl"><span class="tag">PROTOTYPE</span></span>
  <button id="prev" title="previous (←)">←</button>
  <span class="lbl" id="swlabel"></span>
  <button id="next" title="next (→)">→</button>
</div>

<script>
(async function(){
  const VARIANTS = [
    {key:'A', name:'Broadsheet'},
    {key:'B', name:'Ledger & Ink'},
    {key:'C', name:'Trail Cards'}
  ];
  const [events, anchors, paths] = await Promise.all(
    ['data/events.json','data/anchor_cards.json','data/paths.json'].map(u=>fetch(u).then(r=>r.json()))
  );

  const today = new Date(); today.setHours(0,0,0,0);
  const iso = d => d.toISOString().slice(0,10);
  const upcoming = events.filter(e=>e.date >= iso(today)).sort((a,b)=>a.date<b.date?-1:1);
  const fmtLong = d => new Date(d+'T12:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const fmtShort = d => new Date(d+'T12:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  const dayLabel = d => d===iso(today) ? 'Tonight & Today' : fmtShort(d);
  const esc = s => String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
  const trunc = (s,n) => { s=String(s??''); return s.length>n ? s.slice(0,n).replace(/\s+\S*$/,'')+'…' : s; };
  const lead = anchors.find(a=>a.placeId==='the-center-for-the-arts-grass-valley') || anchors[0];
  const stage = document.getElementById('stage');
  let liveMaps = [];

  function inkMap(el, markers, opts={}){
    el.classList.add('ink-map');
    const map = new maplibregl.Map({
      container: el, style:'https://tiles.openfreemap.org/styles/liberty',
      center: opts.center||[-121.05,39.235], zoom: opts.zoom||12.6, attributionControl:{compact:true}
    });
    markers.forEach(m=>{
      if(m.lat==null||m.lng==null) return;
      const d=document.createElement('div');
      d.style.cssText='width:13px;height:13px;border-radius:50%;background:#ff2e00;border:2px solid #f7f7f4;box-shadow:0 0 0 1px #1a1a2e;cursor:pointer';
      d.title=m.title||m.name||'';
      new maplibregl.Marker({element:d}).setLngLat([m.lng,m.lat])
        .setPopup(new maplibregl.Popup({offset:10}).setHTML('<strong>'+esc(m.title||m.name)+'</strong>'))
        .addTo(map);
    });
    liveMaps.push(map);
    return map;
  }

  /* ---------- A · BROADSHEET ---------- */
  function renderA(){
    const byDay = {};
    upcoming.slice(0,16).forEach(e=>(byDay[e.date]??=[]).push(e));
    const evCols = Object.entries(byDay).map(([d,evs])=>
      evs.map((e,i)=>`<div class="bs-ev">
        <div class="d"><b>${i===0?esc(dayLabel(d)):'&nbsp;'}</b>${esc(e.category||'')}</div>
        <h3>${esc(e.title)}</h3>
        <div class="v">${esc(e.placeName||'')}</div>
      </div>`).join('')).join('');
    stage.innerHTML = `<div class="bs">
      <div class="bs-topline"><span>Vol. I — Internal Preview</span><span>Grass Valley · Nevada City</span><span>Free</span></div>
      <div class="bs-masthead">The Nevada County <em>Almanac</em></div>
      <div class="bs-dateline">${esc(fmtLong(iso(today)))}</div>
      <div class="bs-cols">
        <div class="bs-col bs-lead">
          <div class="bs-kicker">Anchor of the day</div>
          <h1>${esc(lead.name)}</h1>
          <p>${esc(lead.hook)}</p>
          <p class="why">${esc(lead.whyItMatters)}</p>
          <div class="bs-mapnote"><span>1,959 places. 24 happenings. 4 routes.</span><a href="index.html">Open the map →</a></div>
        </div>
        <div class="bs-col">
          <div class="bs-kicker">This week's happenings</div>
          ${evCols}
        </div>
        <div class="bs-col">
          <div class="bs-kicker">Routes</div>
          ${paths.map((p,i)=>`<div class="bs-route">
            <h3><span class="no">RT.${String(i+1).padStart(2,'0')}</span>${esc(p.title)}</h3>
            <p>${esc(trunc(p.dek,140))}</p>
            <div class="stops">${p.stops.map(s=>esc(s.name)).join(' → ')}</div>
          </div>`).join('')}
        </div>
      </div>
    </div>`;
  }

  /* ---------- B · LEDGER & INK ---------- */
  function renderB(){
    const list = upcoming.slice(0,20);
    const byDay = {};
    list.forEach(e=>(byDay[e.date]??=[]).push(e));
    stage.innerHTML = `<div class="lg">
      <div class="lg-rail">
        <div class="lg-head">
          <div class="k">${esc(fmtLong(iso(today)))}</div>
          <h1>The County <em>Ledger</em></h1>
        </div>
        ${Object.entries(byDay).map(([d,evs])=>`
          <div class="lg-day">${esc(dayLabel(d))}</div>
          ${evs.map(e=>`<div class="lg-row" data-lat="${e.lat??''}" data-lng="${e.lng??''}">
            <div class="tick ${e.lat==null?'off':''}"></div>
            <div><h3>${esc(e.title)}</h3><div class="v">${esc(e.placeName||e.category||'')}</div></div>
          </div>`).join('')}`).join('')}
      </div>
      <div class="lg-map"><div class="lg-legend"><span class="dot"></span>Happening this week</div><div id="lgmap" style="position:absolute;inset:0"></div></div>
    </div>`;
    const map = inkMap(document.getElementById('lgmap'), list, {zoom:12.2});
    stage.querySelectorAll('.lg-row').forEach(r=>{
      r.addEventListener('click',()=>{
        const lat=parseFloat(r.dataset.lat), lng=parseFloat(r.dataset.lng);
        if(!isNaN(lat)) map.flyTo({center:[lng,lat],zoom:15});
      });
    });
  }

  /* ---------- C · TRAIL CARDS ---------- */
  function renderC(){
    const path = paths.find(p=>p.id==='living-like-a-local') || paths[0];
    const todaysEvents = upcoming.filter(e=>e.date===iso(today)).slice(0,3);
    const items = [];
    path.stops.forEach(s=>items.push({type:'stop',d:s}));
    todaysEvents.forEach((e,i)=>items.splice(Math.min(items.length, i*2+1),0,{type:'ev',d:e}));
    let stopNo=0;
    stage.innerHTML = `<div class="tr">
      <div class="tr-strip"><div class="lbl">Today's route — ${esc(path.title)}</div><div id="trmap" style="position:absolute;inset:0"></div></div>
      <div class="tr-col">
        <div class="tr-date">${esc(fmtLong(iso(today)))}</div>
        <div class="tr-title">${esc(path.title)}</div>
        <div class="tr-dek">${esc(path.dek)}</div>
        ${items.map(it=>{
          if(it.type==='stop'){ stopNo++;
            return `<div class="tr-leg"><span></span></div><div class="tr-card">
              <div class="stamp">${stopNo}</div>
              <div class="k">${esc(it.d.category||'Stop')} · ${esc(it.d.city||'')}</div>
              <h3>${esc(it.d.name)}</h3><p>${esc(it.d.note||'')}</p>
            </div>`;}
          return `<div class="tr-leg"><span></span></div><div class="tr-card ev">
            <div class="stamp">★</div>
            <div class="k">Happening today · ${esc(it.d.category||'')}</div>
            <h3>${esc(it.d.title)}</h3><p>${esc(trunc(it.d.description,150))}</p>
            <div class="meta">${esc(it.d.placeName||'')}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
    inkMap(document.getElementById('trmap'),
      path.stops.concat(todaysEvents), {zoom:12.8});
  }

  /* ---------- switcher plumbing ---------- */
  const renderers = {A:renderA, B:renderB, C:renderC};
  function current(){ const v=new URLSearchParams(location.search).get('variant'); return VARIANTS.some(x=>x.key===v)?v:'A'; }
  function show(key){
    liveMaps.forEach(m=>m.remove()); liveMaps=[];
    history.replaceState(null,'', '?variant='+key);
    renderers[key]();
    const v=VARIANTS.find(x=>x.key===key);
    document.getElementById('swlabel').textContent = v.key+' — '+v.name;
    window.scrollTo(0,0);
  }
  function cycle(dir){
    const i=VARIANTS.findIndex(x=>x.key===current());
    show(VARIANTS[(i+dir+VARIANTS.length)%VARIANTS.length].key);
  }
  document.getElementById('prev').onclick=()=>cycle(-1);
  document.getElementById('next').onclick=()=>cycle(1);
  document.addEventListener('keydown',e=>{
    if(/INPUT|TEXTAREA/.test(document.activeElement.tagName)||document.activeElement.isContentEditable) return;
    if(e.key==='ArrowLeft')cycle(-1); if(e.key==='ArrowRight')cycle(1);
  });
  show(current());
})();
</script>
</body>
</html>
